services:
  vpimp:
    image: vpimp
    build:
      context: .
      dockerfile: ./Dockerfile
    command: ["sh", "-c", "pip install debugpy -t /tmp && python /tmp/debugpy --wait-for-client --listen 0.0.0.0:5678 -m uvicorn LAB1.venv\Lib\site-packages\uvicorn\main:app --host 0.0.0.0 --port 4200"]
    ports:
      - 4200:4200
      - 5678:5678
